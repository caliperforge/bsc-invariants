# bsc-invariants Foundry config
#
# Mirrors the hyperevm-safety convention: solc 0.8.28, CI-friendly fuzz
# budgets, src/ for reference contracts, invariants/ for property tests.
# A protocol's reference contract lives in src/; the paired property
# bundle lives in invariants/.
#
# Recon Chimera is not yet wired (lands at M2). Until then,
# `forge test` runs the unit + invariant tests under `invariants/`
# directly against the references in `src/`.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "invariants"

solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "forge-std/=lib/forge-std/src/",
]

# Authoritative remappings above; do not walk lib/* for nested foundry.toml.
auto_detect_remappings = false

ffi = false

[fuzz]
# Modest local budget; nightly CI (M2) bumps for long campaigns.
runs = 1000

[invariant]
runs = 256
depth = 50
fail_on_revert = false
call_override = false
dictionary_weight = 80
include_storage = true
include_push_bytes = true

# Pinned formatter style. The hand-written multi-line argument layouts in
# the references + tests (5-arg constructors, 4-arg simulateSwapStep
# signatures, multi-line require/assertLe) are deliberately more readable
# than the default forge-fmt collapse-to-one-line behavior at 100 chars.
# Pinning here makes a future `forge fmt` rerun honor those layouts.
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "preserve"
